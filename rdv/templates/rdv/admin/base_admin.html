{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Dashboard{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  
  <link rel="stylesheet" href="{% static 'rdv/css/admin/users/profil_user.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/admin/rdvs/rdvs.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/notifs/notifs.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/admin/rapports/rapports.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/admin/history/history.css' %}">

  <!-- ICONES -->
  <link rel="stylesheet" href="{% static 'rdv/css/boxicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/transformations.css' %}">

  <!-- COMPOSANTS -->
  <link rel="stylesheet" href="{% static 'rdv/css/composants/menu.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/composants/card.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/composants/card_jour.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/composants/card_recent.css' %}">

  <!-- FEUILLES DE STYLE GLOBALES -->
  <link rel="stylesheet" href="{% static 'rdv/css/admin/dashboard/dashboard_admin.css' %}">
  <link rel="stylesheet" href="{% static 'rdv/css/base.css' %}">

  {% block extra_css %}{% endblock %}
</head>

<body>
  <div class="app-container">
    <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <div id="sidebar" class="sidebar">
      <!-- Contenu de la sidebar -->
      <!-- NAV TABS -->
      {% block extra_block %}
      {% endblock %}
    </div>

      <!-- CONTENU PRINCIPAL (AJAX INJECTÉ) -->
    <div id="ajax-content">
        {% block content %}{% endblock %}

        {% block extra_js %}
        {{ block.super }}
          <script defer src="{% static 'rdv/js/admin/composants/menu.js' %}"></script>
      {% endblock %}

      <!-- SCRIPTS GLOBAUX & COMPOSANTS -->
      <script src="{% static 'rdv/js/boxicons.min.js' %}"></script>
      <script defer src="{% static 'rdv/js/base.js' %}"></script>         
    </div>
             
  </div>

</body>
</html>
