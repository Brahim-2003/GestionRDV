<div class="card">
    <div class="card-header">
      <h3 class="card-title">Rendez-vous récents</h3>
    </div>
    <div class="card-body">
      {% if rdv_recents %}
      <ul class="recent-list">
        {% for rdv in rdv_recents %}
        <li class="recent-item">
          <strong>{{ rdv.user.nom }} {{ rdv.user.prenom }}</strong><br>
          <span>{{ rdv.date_heure_rdv|date:"d M Y H:i" }}</span><br>
          <span>{{ rdv.statut }}</span>
        </li>
        {% endfor %}
      </ul>
      {% else %}
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <p>Aucun rendez-vous récent</p>
      </div>
      {% endif %}
    </div>
  </div>
</div>
